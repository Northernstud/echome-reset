<!DOCTYPE html>
<html>
<head>
  <title>Reset your EchoMe password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: monospace; background: #07070C; color: #F3F3F8;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
            border-radius: 22px; padding: 32px; max-width: 380px; width: 90%; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    p  { color: #9B9BA8; font-size: 13px; margin: 0 0 24px; }
    input { width: 100%; box-sizing: border-box; padding: 14px 16px;
            background: #12121C; border: 1px solid rgba(255,255,255,0.20);
            border-radius: 14px; color: #F3F3F8; font-family: monospace;
            font-size: 14px; margin-bottom: 14px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 14px;
             background: linear-gradient(to bottom right, #C953FF, #FF005E);
             color: #F3F3F8; font-family: monospace; font-size: 14px;
             font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 13px; color: #9B9BA8; text-align: center; }
    .msg.error { color: #FF6B7A; }
  </style>
</head>
<body>
<div class="card">
  <h2>Reset password</h2>
  <p>Choose a new password for your EchoMe account.</p>
  <input type="password" id="pw"  placeholder="New password" />
  <input type="password" id="pw2" placeholder="Confirm password" />
  <button id="btn" onclick="reset()" disabled>Set new password</button>
  <div class="msg" id="msg">Verifying reset link…</div>
</div>
<script>
  const { createClient } = supabase;
  const client = createClient(
    'https://qjtkelvwfgnowohtohoc.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqdGtlbHZ3Zmdub3dvaHRvaG9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2Njk3NjAsImV4cCI6MjA5NTI0NTc2MH0.8PVoJ5wFOiu4HKuKmOLQdaKUsgaBvEVWwD2ydK8Y2TY',
    { auth: { flowType: 'implicit' } }
  );

  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');
  let sessionReady = false;

  function setError(text) { msg.textContent = text; msg.classList.add('error'); }
  function setInfo(text)  { msg.textContent = text; msg.classList.remove('error'); }

  function enable() {
    sessionReady = true;
    btn.disabled = false;
    setInfo('Ready — enter your new password below.');
  }

  // Register the listener first so we never miss the PASSWORD_RECOVERY event.
  client.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') enable();
  });

  // Establish the session from the link. Implicit links carry tokens in the URL
  // hash; we also fall back to a code exchange for older PKCE links.
  (async function initSession() {
    const hash  = new URLSearchParams(window.location.hash.slice(1));
    const query = new URLSearchParams(window.location.search);

    const accessToken  = hash.get('access_token');
    const refreshToken = hash.get('refresh_token') || '';
    const code         = query.get('code');

    if (accessToken) {
      const { error } = await client.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken,
      });
      if (error) setError('This link has expired or was already used. Request a new reset link from the app.');
      else enable();
      return;
    }

    if (code) {
      const { error } = await client.auth.exchangeCodeForSession(code);
      if (error) setError('This link can\'t be opened here. Please request a new reset link from the app.');
      else enable();
      return;
    }

    setError('No reset token found. Please request a new password reset link from the app.');
  })();

  async function reset() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;

    if (pw !== pw2)     { setError('Passwords do not match.');                 return; }
    if (pw.length < 6)  { setError('Password must be at least 6 characters.'); return; }
    if (!sessionReady)  { setError('Session not ready — please wait a moment.'); return; }

    btn.disabled = true;
    btn.textContent = 'Updating…';
    msg.classList.remove('error');

    const { error } = await client.auth.updateUser({ password: pw });

    if (error) {
      setError(error.message);
      btn.disabled = false;
      btn.textContent = 'Set new password';
    } else {
      setInfo('✓ Password updated — go back to the app and log in.');
      btn.textContent = 'Done ✓';
      document.getElementById('pw').value  = '';
      document.getElementById('pw2').value = '';
    }
  }
</script>
</body>
</html>
