<!DOCTYPE html>
<html>
<head>
  <title>Reset your EchoMe password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: monospace; background: #07070C; color: #F3F3F8;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; margin: 0; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
            border-radius: 22px; padding: 32px; max-width: 380px; width: 90%; }
    h2 { margin: 0 0 8px; font-size: 20px; }
    p  { color: #9B9BA8; font-size: 13px; margin: 0 0 24px; }
    input { width: 100%; box-sizing: border-box; padding: 14px 16px;
            background: #12121C; border: 1px solid rgba(255,255,255,0.20);
            border-radius: 14px; color: #F3F3F8; font-family: monospace;
            font-size: 14px; margin-bottom: 14px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 14px;
             background: linear-gradient(to bottom right, #C953FF, #FF005E);
             color: #F3F3F8; font-family: monospace; font-size: 14px;
             font-weight: 700; cursor: pointer; }
    .msg { margin-top: 16px; font-size: 13px; color: #9B9BA8; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <h2>Reset password</h2>
  <p>Choose a new password for your EchoMe account.</p>
  <input type="password" id="pw"  placeholder="New password" />
  <input type="password" id="pw2" placeholder="Confirm password" />
  <button onclick="reset()">Set new password</button>
  <div class="msg" id="msg"></div>
</div>
<script>
  const { createClient } = supabase;
  const client = createClient('https://qjtkelvwfgnowohtohoc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqdGtlbHZ3Zmdub3dvaHRvaG9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2Njk3NjAsImV4cCI6MjA5NTI0NTc2MH0.8PVoJ5wFOiu4HKuKmOLQdaKUsgaBvEVWwD2ydK8Y2TY');

  // Supabase puts the session in the URL hash on redirect
  client.auth.getSession();

  async function reset() {
    const pw  = document.getElementById('pw').value;
    const pw2 = document.getElementById('pw2').value;
    const msg = document.getElementById('msg');
    if (pw !== pw2)  { msg.textContent = 'Passwords do not match.'; return; }
    if (pw.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; return; }
    const { error } = await client.auth.updateUser({ password: pw });
    msg.textContent = error ? error.message : '✓ Password updated — go back to the app and log in.';
  }
</script>
</body>
</html>
